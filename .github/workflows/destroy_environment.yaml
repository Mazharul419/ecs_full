name: Terragrunt Destroy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to destroy'
        required: true
        type: choice
        options:
          - dev
          - prod
          - all
      confirm_destroy:
        description: 'Type "confirm-destroy" to run destroy'
        required: false
        type: string

env:
  AWS_REGION: eu-west-2
  TERRAGRUNT_VERSION: 0.93.13
  TERRAFORM_VERSION: 1.14.1
  ASDF_TERRAGRUNT_SKIP_CHECKSUM: "true"
  TF_VAR_cloudflare_api_token: ${{ secrets.TF_VAR_cloudflare_api_token }}

permissions:
  id-token: write
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    
    steps:
      - name: Check destroy confirmation
        if: inputs.confirm_destroy != 'confirm-destroy'
        run: |
          echo "Destroy action requires confirmation."
          echo "Please type 'confirm-destroy' in the confirm_destroy field."
          exit 1

  dev:
    name: dev
    needs: validate
    runs-on: ubuntu-latest
    environment: dev
    if: inputs.environment == 'dev' || inputs.environment == 'all'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-role
          aws-region: ${{ env.AWS_REGION }}
          role-duration-seconds: 3600

      - name: Create common.hcl
        run: |
          mkdir -p $GITHUB_WORKSPACE/infrastructure/live/_env
          cat > $GITHUB_WORKSPACE/infrastructure/live/_env/common.hcl <<EOF
          locals {
            container_port     = 8080
            domain_name        = "mazharulislam.dev"
            cloudflare_zone_id = "${{ secrets.CLOUDFLARE_ZONE_ID }}"
          }
          EOF

      - name: Set working directory
        id: set-dir
        run: |
            echo "dir=$GITHUB_WORKSPACE/infrastructure/live/dev" >> $GITHUB_OUTPUT

      - name: Print working directory
        run: echo ${{ steps.set-dir.outputs.dir }}

      - name: Terragrunt Destroy
        uses: gruntwork-io/terragrunt-action@v2
        with:
          tf_version: ${{ env.TERRAFORM_VERSION }}
          tg_version: ${{ env.TERRAGRUNT_VERSION }}
          tg_dir: ${{ steps.set-dir.outputs.dir }}
          tg_command: 'run --all destroy'
          tg_cli_args: '--non-interactive'

      - name: Summary
        if: always()
        run: |
          echo "### Terragrunt ${{ inputs.action }} ${{ inputs.environment }} Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Action**: ${{ inputs.action }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Directory**: ${GITHUB_WORKSPACE}/infrastructure/live/dev" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
  
  prod:
    name: prod
    needs: validate
    runs-on: ubuntu-latest
    environment: prod
    if: inputs.environment == 'prod' || inputs.environment == 'all'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-role
          aws-region: ${{ env.AWS_REGION }}
          role-duration-seconds: 3600

      - name: Create common.hcl
        run: |
          mkdir -p $GITHUB_WORKSPACE/infrastructure/live/_env
          cat > $GITHUB_WORKSPACE/infrastructure/live/_env/common.hcl <<EOF
          locals {
            container_port     = 8080
            domain_name        = "mazharulislam.dev"
            cloudflare_zone_id = "${{ secrets.CLOUDFLARE_ZONE_ID }}"
          }
          EOF

      - name: Set working directory
        id: set-dir
        run: |
            echo "dir=$GITHUB_WORKSPACE/infrastructure/live/prod" >> $GITHUB_OUTPUT

      - name: Print working directory
        run: echo ${{ steps.set-dir.outputs.dir }}

      - name: Terragrunt Destroy
        uses: gruntwork-io/terragrunt-action@v2
        with:
          tf_version: ${{ env.TERRAFORM_VERSION }}
          tg_version: ${{ env.TERRAGRUNT_VERSION }}
          tg_dir: ${{ steps.set-dir.outputs.dir }}
          tg_command: 'run --all destroy'
          tg_cli_args: '--non-interactive'

      - name: Summary
        if: always()
        run: |
          echo "### Terragrunt ${{ inputs.action }} ${{ inputs.environment }} Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Action**: ${{ inputs.action }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Directory**: ${GITHUB_WORKSPACE}/infrastructure/live/prod" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY